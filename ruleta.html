<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lumina Casino — Ruleta</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --gold-dark: #8a6520;
    --deep: #0a0608;
    --felt: #0d1a0f;
    --card: #13100e;
    --red: #c0392b;
    --accent: #e8d5a3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--accent);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Fondo con patrón de casino */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(212,168,67,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(192,57,43,0.04) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(212,168,67,0.015) 30px, rgba(212,168,67,0.015) 31px);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px 16px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .header .subtitle {
    font-size: 0.75rem;
    color: rgba(212,168,67,0.5);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  /* Ruleta */
  .wheel-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Resplandor exterior */
  .wheel-glow {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(212,168,67,0.12) 0%, transparent 70%);
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Anillo exterior decorativo */
  .wheel-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(212,168,67,0.3);
    background: transparent;
  }

  .wheel-ring::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(212,168,67,0.15);
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow:
      0 0 0 3px var(--gold-dark),
      0 0 0 5px rgba(212,168,67,0.2),
      0 20px 60px rgba(0,0,0,0.8);
    position: relative;
    z-index: 2;
  }

  /* Flecha indicadora */
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    filter: drop-shadow(0 2px 6px rgba(212,168,67,0.6));
  }

  .pointer svg {
    width: 28px;
    height: 34px;
  }

  /* Centro de la ruleta */
  .wheel-center {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle, #1a1410 0%, #0a0608 100%);
    border: 2px solid var(--gold-dark);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
  }

  .wheel-center::after {
    content: '✦';
    color: var(--gold);
    font-size: 16px;
  }

  /* Info de fichas */
  .chips-display {
    text-align: center;
    background: rgba(212,168,67,0.05);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 8px;
    padding: 10px 24px;
    width: 100%;
  }

  .chips-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(212,168,67,0.5);
    text-transform: uppercase;
  }

  .chips-value {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-top: 2px;
  }

  /* Botón girar */
  .spin-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #b8860b 0%, #d4a843 40%, #f0c96a 60%, #d4a843 100%);
    border: none;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--deep);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(212,168,67,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .spin-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
  }

  .spin-btn:hover::before { left: 100%; }

  .spin-btn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(212,168,67,0.3);
  }

  .spin-btn:disabled {
    background: linear-gradient(135deg, #3a3228 0%, #4a4038 100%);
    color: rgba(255,255,255,0.2);
    cursor: not-allowed;
    box-shadow: none;
  }

  .spin-btn:disabled::before { display: none; }

  /* Resultado */
  .result-panel {
    width: 100%;
    text-align: center;
    padding: 16px;
    border-radius: 6px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.2);
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.5s ease;
  }

  .result-panel.win {
    background: rgba(212,168,67,0.12);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212,168,67,0.15);
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(212,168,67,0.5);
    text-transform: uppercase;
  }

  .result-amount {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    color: var(--gold-light);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease 0.2s;
  }

  .result-amount.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-msg {
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(232,213,163,0.6);
    opacity: 0;
    transition: opacity 0.4s ease 0.4s;
  }

  .result-msg.show { opacity: 1; }

  /* Cooldown */
  .cooldown-panel {
    width: 100%;
    text-align: center;
    padding: 14px;
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 6px;
    display: none;
  }

  .cooldown-panel.active { display: block; }

  .cooldown-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: #e74c3c;
    margin-bottom: 4px;
  }

  .cooldown-timer {
    font-size: 1.4rem;
    color: rgba(232,213,163,0.7);
    font-variant-numeric: tabular-nums;
  }

  /* Partículas de victoria */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    display: none;
  }

  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: fallParticle 1.5s ease-out forwards;
  }

  @keyframes fallParticle {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Separador decorativo */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,0.3), transparent);
  }

  /* Tabla de premios */
  .prizes-mini {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .prize-chip {
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.12);
    border-radius: 4px;
    padding: 6px 4px;
    text-align: center;
  }

  .prize-chip .p-emoji { font-size: 1rem; }
  .prize-chip .p-amount {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--gold);
    display: block;
    margin-top: 2px;
  }
  .prize-chip .p-prob {
    font-size: 0.55rem;
    color: rgba(212,168,67,0.4);
    display: block;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Lumina Casino</h1>
    <div class="subtitle">✦ Ruleta de la Fortuna ✦</div>
  </div>

  <div class="chips-display">
    <div class="chips-label">Tus fichas</div>
    <div class="chips-value" id="chipsDisplay">—</div>
  </div>

  <div class="wheel-wrapper">
    <div class="wheel-glow"></div>
    <div class="wheel-ring"></div>
    <canvas id="wheel" width="280" height="280"></canvas>
    <div class="pointer">
      <svg viewBox="0 0 28 34" fill="none">
        <path d="M14 34 L0 8 Q14 0 28 8 Z" fill="#d4a843"/>
        <path d="M14 30 L3 10 Q14 4 25 10 Z" fill="#f0c96a"/>
        <circle cx="14" cy="14" r="4" fill="#0a0608" stroke="#d4a843" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="wheel-center"></div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-label">Premio</div>
    <div class="result-amount" id="resultAmount">—</div>
    <div class="result-msg" id="resultMsg">Gira la ruleta para ganar</div>
  </div>

  <div class="cooldown-panel" id="cooldownPanel">
    <div class="cooldown-title">⏳ Próximo giro disponible en</div>
    <div class="cooldown-timer" id="cooldownTimer">—</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
    ✦ GIRAR RULETA ✦
  </button>

  <div class="divider"></div>

  <div class="prizes-mini" id="prizesTable"></div>

</div>

<div class="particles" id="particles"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // ── CONFIGURACIÓN ──────────────────────────────────────────
  const COOLDOWN_MS = 5 * 60 * 60 * 1000; // 5 horas

  const SEGMENTS = [
    { label: '300K',   amount: 300_000,   color: '#1a472a', emoji: '🌿', prob: 28 },
    { label: '500K',   amount: 500_000,   color: '#1e3a5f', emoji: '💧', prob: 22 },
    { label: '750K',   amount: 750_000,   color: '#4a1942', emoji: '🔮', prob: 18 },
    { label: '1M',     amount: 1_000_000, color: '#5c3317', emoji: '🔥', prob: 13 },
    { label: '1.5M',   amount: 1_500_000, color: '#1a3a1a', emoji: '💎', prob: 9  },
    { label: '2M',     amount: 2_000_000, color: '#3d1515', emoji: '❤️', prob: 5  },
    { label: '3M',     amount: 3_000_000, color: '#2c1810', emoji: '🌋', prob: 3  },
    { label: '4.5M',   amount: 4_500_000, color: '#1a1410', emoji: '👑', prob: 2  },
  ];

  // Construir tabla de premios
  const prizesTable = document.getElementById('prizesTable');
  SEGMENTS.forEach(s => {
    prizesTable.innerHTML += `
      <div class="prize-chip">
        <span class="p-emoji">${s.emoji}</span>
        <span class="p-amount">${s.label}</span>
        <span class="p-prob">${s.prob}%</span>
      </div>`;
  });

  // ── CANVAS RULETA ──────────────────────────────────────────
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = cx - 4;

  let currentAngle = 0;
  let spinning = false;

  function drawWheel(angle) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const arc = (2 * Math.PI) / SEGMENTS.length;

    SEGMENTS.forEach((seg, i) => {
      const start = angle + i * arc;
      const end   = start + arc;

      // Sector
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();

      // Borde dorado entre sectores
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(212,168,67,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Texto
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + arc / 2);

      // Emoji
      ctx.font = '18px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(seg.emoji, r * 0.62, 0);

      // Monto
      ctx.font = 'bold 11px Cinzel, serif';
      ctx.fillStyle = '#d4a843';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(seg.label, r * 0.82, 0);
      ctx.shadowBlur = 0;

      ctx.restore();
    });

    // Anillo exterior dorado
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(212,168,67,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Anillo interior
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.45, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(212,168,67,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  drawWheel(currentAngle);

  // ── LÓGICA DE GIRO ────────────────────────────────────────
  function weightedRandom() {
    const total = SEGMENTS.reduce((s, seg) => s + seg.prob, 0);
    let rand = Math.random() * total;
    for (let i = 0; i < SEGMENTS.length; i++) {
      rand -= SEGMENTS[i].prob;
      if (rand <= 0) return i;
    }
    return 0;
  }

  function spinWheel() {
    if (spinning) return;

    const userId = tg?.initDataUnsafe?.user?.id || 'dev';
    const key = `lumina_ruleta_${userId}`;
    const lastSpin = localStorage.getItem(key);
    const now = Date.now();

    if (lastSpin && now - parseInt(lastSpin) < COOLDOWN_MS) {
      const remaining = COOLDOWN_MS - (now - parseInt(lastSpin));
      showCooldown(remaining);
      return;
    }

    spinning = true;
    document.getElementById('spinBtn').disabled = true;

    const winIndex = weightedRandom();
    const arc = (2 * Math.PI) / SEGMENTS.length;

    // Calcular ángulo final para que el segmento ganador quede arriba (apuntando a la flecha)
    const targetAngle = -(winIndex * arc + arc / 2) + (3 * Math.PI / 2);
    const fullSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
    const finalAngle = fullSpins + targetAngle - currentAngle;

    const duration = 4000 + Math.random() * 1000;
    const startAngle = currentAngle;
    const startTime = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = easeOut(progress);

      currentAngle = startAngle + finalAngle * eased;
      drawWheel(currentAngle);

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = startAngle + finalAngle;
        drawWheel(currentAngle);
        spinning = false;

        // Guardar cooldown
        localStorage.setItem(key, now.toString());

        // Mostrar resultado
        showResult(SEGMENTS[winIndex]);

        // Notificar al bot
        if (tg) {
          tg.sendData(JSON.stringify({
            action: 'ruleta_resultado',
            amount: SEGMENTS[winIndex].amount,
            label: SEGMENTS[winIndex].label
          }));
        }
      }
    }

    requestAnimationFrame(animate);
  }

  // ── MOSTRAR RESULTADO ────────────────────────────────────
  function showResult(seg) {
    const panel = document.getElementById('resultPanel');
    const amount = document.getElementById('resultAmount');
    const msg = document.getElementById('resultMsg');

    panel.classList.add('win');
    amount.textContent = `+$${seg.amount.toLocaleString()}`;
    amount.classList.add('show');

    const msgs = [
      'La fortuna te sonríe esta noche.',
      'Los dioses del azar te favorecen.',
      'Una ganancia digna del Lumina.',
      'El casino nunca olvida a sus campeones.'
    ];
    msg.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    msg.classList.add('show');

    // Actualizar fichas display
    updateChipsDisplay(seg.amount);

    // Partículas
    if (seg.amount >= 2_000_000) launchParticles();

    // Cooldown timer
    startCooldownDisplay();
  }

  function updateChipsDisplay(gained) {
    const el = document.getElementById('chipsDisplay');
    const current = parseInt(el.dataset.chips || 0);
    const newVal = current + gained;
    el.dataset.chips = newVal;
    el.textContent = `$${newVal.toLocaleString()}`;
  }

  // ── COOLDOWN ──────────────────────────────────────────────
  function showCooldown(remaining) {
    const panel = document.getElementById('cooldownPanel');
    panel.classList.add('active');
    updateCooldownTimer(remaining);
  }

  function startCooldownDisplay() {
    showCooldown(COOLDOWN_MS);
  }

  function updateCooldownTimer(ms) {
    const panel = document.getElementById('cooldownPanel');
    const timer = document.getElementById('cooldownTimer');
    if (ms <= 0) {
      panel.classList.remove('active');
      document.getElementById('spinBtn').disabled = false;
      return;
    }
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    timer.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    setTimeout(() => updateCooldownTimer(ms - 1000), 1000);
  }

  // ── PARTÍCULAS ────────────────────────────────────────────
  function launchParticles() {
    const container = document.getElementById('particles');
    container.style.display = 'block';
    const colors = ['#d4a843', '#f0c96a', '#c0392b', '#e8d5a3', '#ffffff'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-10px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDelay = Math.random() * 0.8 + 's';
      p.style.animationDuration = (1 + Math.random()) + 's';
      container.appendChild(p);
    }
    setTimeout(() => {
      container.style.display = 'none';
      container.innerHTML = '';
    }, 2500);
  }

  // ── INIT ──────────────────────────────────────────────────
  function init() {
    // Fichas del usuario desde Telegram
    const user = tg?.initDataUnsafe?.user;
    const chipsEl = document.getElementById('chipsDisplay');

    if (user) {
      chipsEl.textContent = 'Cargando...';
      // En producción aquí harías fetch al servidor para obtener fichas reales
      chipsEl.textContent = '$—';
      chipsEl.dataset.chips = 0;
    } else {
      chipsEl.textContent = 'Demo';
      chipsEl.dataset.chips = 10_000_000;
    }

    // Verificar cooldown al cargar
    const userId = tg?.initDataUnsafe?.user?.id || 'dev';
    const key = `lumina_ruleta_${userId}`;
    const lastSpin = localStorage.getItem(key);
    if (lastSpin) {
      const remaining = COOLDOWN_MS - (Date.now() - parseInt(lastSpin));
      if (remaining > 0) {
        showCooldown(remaining);
        document.getElementById('spinBtn').disabled = true;
      }
    }

    // Animación inicial de la ruleta (giro lento)
    let idleAngle = 0;
    function idleSpin() {
      if (!spinning) {
        idleAngle += 0.002;
        drawWheel(currentAngle + idleAngle * 0);
      }
      requestAnimationFrame(idleSpin);
    }
  }

  init();
</script>
</body>
  </html>
